<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>JeenaFlix — Premium OTT Streaming</title>
<meta name="description" content="JeenaFlix premium OTT streaming — Movies, TV Series, Live TV, and OTT Apps." />
<link rel="icon" href="https://www.jeenaflix.com/DOC-20260325-WA0063..png" />
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<style>
:root{
  /* Strictly preserved original dark color theme */
  --bg:#08090d; --bg2:#0e1016; --card:#15171f; --soft:#1c1f2a;
  --text:#f5f6fa; --muted:#9aa0ad; --red:#e50914; --red2:#ff2d3a;
  --radius:14px; --shadow:0 10px 30px rgba(0,0,0,.5);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:auto;-webkit-overflow-scrolling:touch}
html{scroll-behavior:smooth}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow-x:hidden}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;touch-action:manipulation}
::-webkit-scrollbar{height:6px;width:6px}
::-webkit-scrollbar-thumb{background:#2a2d38;border-radius:8px}

/* Splash */
#splash{position:fixed;inset:0;background:radial-gradient(ellipse at center,#1a0205 0%,#08090d 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s ease}
#splash.hide{opacity:0;pointer-events:none}
#splash img{width:120px;height:120px;border-radius:24px;object-fit:cover;box-shadow:0 0 60px rgba(229,9,20,.55);animation:pulse 1.6s ease-in-out infinite}
#splash .brand{margin-top:22px;font-size:34px;font-weight:800;letter-spacing:1px}
#splash .brand .r{color:var(--red2)}
#splash .loader{margin-top:28px;width:160px;height:3px;background:#1a1c25;border-radius:4px;overflow:hidden}
#splash .loader::after{content:"";display:block;width:40%;height:100%;background:linear-gradient(90deg,var(--red),var(--red2));animation:slide 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
#splash .splash-msg{margin-top:22px;font-size:14px;font-weight:600;color:var(--muted);letter-spacing:.4px;min-height:20px;text-align:center;padding:0 28px;max-width:340px;transition:opacity .35s ease}

/* Top Bar */
.topbar{position:sticky;top:0;z-index:70;background:linear-gradient(180deg,rgba(8,9,13,.95),rgba(8,9,13,.7) 80%,transparent);backdrop-filter:blur(12px);padding:12px 18px;display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:22px;flex-shrink:0;min-width:0}
.logo img{width:38px;height:38px;border-radius:10px;object-fit:cover;flex-shrink:0}
.logo span{white-space:nowrap}
.logo .r{color:var(--red2)}
.search{flex:1;min-width:0;display:flex;align-items:center;background:var(--soft);border-radius:30px;padding:8px 14px;max-width:520px;margin-left:auto}
.search input{flex:1;min-width:0;background:none;border:none;outline:none;color:var(--text);font-size:14px;margin-left:8px}
.search svg{width:18px;height:18px;opacity:.7;flex-shrink:0}
.search-toggle{display:none;width:40px;height:40px;border-radius:50%;background:var(--soft);align-items:center;justify-content:center;flex-shrink:0;margin-left:auto}
.search-toggle svg{width:18px;height:18px}
@media (max-width:520px){
  .topbar{padding:10px 14px;gap:10px}
  .logo{font-size:18px;gap:8px}
  .logo img{width:32px;height:32px;border-radius:8px}
  .search{display:none;position:absolute;top:64px;left:12px;right:12px;max-width:none;margin:0;z-index:55;box-shadow:var(--shadow)}
  .search.open{display:flex}
  .search-toggle{display:flex}
  .search-results{top:118px}
}

/* Layout */
main{padding:0 0 110px 0;min-height:100vh}
.section{padding:22px 18px 6px}
.section h2{font-size:18px;margin:0 0 16px;font-weight:700;letter-spacing:.3px; display:flex; align-items:center; gap:8px;}
.row{display:flex;gap:14px;overflow-x:auto;padding-bottom:14px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;touch-action:pan-x;overscroll-behavior-inline:contain;overscroll-behavior-y:auto}
.section{content-visibility:visible;contain-intrinsic-size:auto 320px}
.grid{content-visibility:visible;contain-intrinsic-size:auto 1200px}
.card,.ott-card{will-change:transform}
.row::-webkit-scrollbar{display:none}

/* Standard Cards */
.card{flex:0 0 auto;width:140px;border-radius:12px;overflow:hidden;background:var(--card);position:relative;cursor:pointer;transition:transform .3s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow .3s ease;scroll-snap-align:start;user-select:none}
.card:hover{transform:translateY(-6px) scale(1.04);box-shadow:var(--shadow);z-index:2}
.card .poster{width:100%;aspect-ratio:2/3;background:#1a1c25 center/cover no-repeat;display:flex;align-items:center;justify-content:center;color:#3a3d48;font-size:30px;font-weight:800}
.card.live .poster{aspect-ratio:16/10;background-color:#11131a}
.card .meta{padding:10px}
.card .meta .t{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .badge{position:absolute;top:8px;left:8px;background:var(--red);color:#fff;font-size:10px;padding:3px 7px;border-radius:6px;font-weight:800;letter-spacing:.5px; text-transform: uppercase;}

/* Premium OTT Cards */
.ott-card{flex:0 0 auto;width:160px;height:90px;border-radius:12px;background:linear-gradient(145deg, #1f2230, #13151d);position:relative;cursor:pointer;transition:all .3s ease;scroll-snap-align:start; display:flex; align-items:center; justify-content:center; border: 1px solid rgba(255,255,255,0.05);user-select:none}
.ott-card::before { content:''; position:absolute; inset:0; border-radius:12px; background:radial-gradient(circle at 50% 0%, rgba(255,255,255,0.1), transparent 70%); opacity:0; transition:opacity .3s; }
.ott-card:hover{transform:translateY(-4px) scale(1.05);box-shadow:0 10px 25px rgba(0,0,0,0.6); border-color:rgba(255,255,255,0.15); z-index:2}
.ott-card:hover::before { opacity:1; }
.ott-card span { font-size: 18px; font-weight: 800; letter-spacing: 0.5px; z-index: 2; position:relative;}
.ott-card.netflix { background: linear-gradient(135deg, #E50914 0%, #83050C 100%); }
.ott-card.prime { background: linear-gradient(135deg, #00A8E1 0%, #005A7A 100%); }
.ott-card.disney { background: linear-gradient(135deg, #113CCF 0%, #0A1B5E 100%); }
.ott-card.sonyliv { background: linear-gradient(135deg, #FF9900 0%, #D11515 100%); }
.ott-card.zee5 { background: linear-gradient(135deg, #8230C6 0%, #3B1659 100%); }
.ott-card.jio { background: linear-gradient(135deg, #141414 0%, #000000 100%); }

/* Hero */
.hero{position:relative;height:62vh;min-height:380px;margin:8px 18px 0;border-radius:18px;overflow:hidden;background:#101218}
.hero .bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.55)}
.hero .grad{position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(8,9,13,.95) 100%),linear-gradient(90deg,rgba(8,9,13,.85),transparent 60%)}
.hero .inner{position:absolute;left:0;right:0;bottom:0;padding:24px 26px}
.hero h1{font-size:36px;margin:0 0 10px;font-weight:800;line-height:1.1;max-width:600px; text-shadow: 0 2px 10px rgba(0,0,0,0.8);}
.hero p{max-width:560px;color:#d3d6df;font-size:15px;margin:0 0 20px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; text-shadow: 0 1px 5px rgba(0,0,0,0.8);}
.hero .actions{display:flex;gap:12px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:30px;font-weight:700;font-size:14px;transition:transform .15s}
.btn:hover{transform:scale(1.05)}
.btn.play{background:#fff;color:#000}
.btn.info{background:rgba(255,255,255,.2);color:#fff;backdrop-filter:blur(10px)}

/* Grid view */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:14px;padding:18px}
.grid .card{width:100%}

/* Category chips */
.chips-wrap{display:flex; flex-direction:column; gap:8px; padding:14px 18px 4px;}
.chips{display:flex;gap:10px;overflow-x:auto;}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:8px 18px;background:var(--soft);border-radius:30px;font-size:13px;font-weight:600;color:#cfd2dc;cursor:pointer;white-space:nowrap;transition:all .2s; border: 1px solid transparent;user-select:none}
.chip:hover{background: #2a2e3d;}
.chip.active{background:linear-gradient(135deg,var(--red),var(--red2));color:#fff; border-color: rgba(255,255,255,0.1); box-shadow: 0 4px 15px rgba(229,9,20,0.3);}

/* Bottom Nav */
.bottomnav{position:fixed;left:0;right:0;bottom:0;z-index:60;background:rgba(14,16,22,.95);backdrop-filter:blur(20px);border-top:1px solid #1c1f2a;display:flex;justify-content:space-around;padding:8px 0 max(8px,env(safe-area-inset-bottom))}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 14px;border-radius:10px;color:var(--muted);font-size:11px;font-weight:600;transition:color .2s}
.nav-btn svg{width:24px;height:24px}
.nav-btn.active{color:var(--text); text-shadow: 0 0 10px rgba(255,255,255,0.2);}
.nav-btn.active svg{stroke:var(--red2);}

/* Page system */
.page{display:none;animation:fadeIn .3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* Details modal */
.details{position:fixed;inset:0;z-index:80;background:var(--bg);overflow-y:auto;display:none}
.details.open{display:block;animation:slideUp .35s cubic-bezier(.2,.8,.2,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.details .back{position:fixed;top:14px;left:14px;width:42px;height:42px;border-radius:50%;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:5}
.details .backdrop{position:relative;height:55vh;min-height:300px;background-size:cover;background-position:center top}
.details .backdrop::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,var(--bg) 100%)}
.details .body{padding:0 24px 40px;margin-top:-90px;position:relative;z-index:2}
.details h1{font-size:32px;margin:0 0 12px;font-weight:800; text-shadow: 0 2px 10px rgba(0,0,0,0.8);}
.details .info{display:flex;flex-wrap:wrap;gap:12px;color:#d3d6df;font-size:13px;margin-bottom:16px; font-weight:600;}
.details .info span{background:rgba(255,255,255,0.1);padding:4px 12px;border-radius:6px; border: 1px solid rgba(255,255,255,0.05);}
.details .info span.match { color: #46d369; font-weight:800; background:transparent; padding:4px 0; border:none; font-size:14px;}
.details .desc{color:#cfd2dc;line-height:1.6;font-size:15px;margin-bottom:24px; max-width:800px;}
.details .actions{display:flex;gap:12px;margin-bottom:32px}

/* Advanced Premium Player - Layout Updated */
.player{position:fixed;inset:0;width:100vw;width:100dvw;height:100vh;height:100dvh;background:#000;z-index:100;display:none;flex-direction:column;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;contain:layout paint size}
.player.open{display:flex}
.player video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000;transform:translateZ(0)}

/* Loading Overlay - Please Wait */
.player .loading-wrapper {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  display:none; flex-direction:column; align-items:center; gap:16px; z-index:30; pointer-events:none;
}
.player.loading .loading-wrapper { display:flex; }
.player .wait-text { color:#fff; font-size:17px; font-weight:700; letter-spacing:0.6px; padding:10px 22px; background:rgba(0,0,0,0.5); border-radius:999px; backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.08); animation:waitPulse 1.4s ease-in-out infinite; }
@keyframes waitPulse { 0%,100%{opacity:.85} 50%{opacity:1} }

.player .pcontrols{position:absolute;inset:0;z-index:12;display:flex;flex-direction:column;justify-content:space-between;padding:16px 24px calc(16px + env(safe-area-inset-bottom));opacity:1;pointer-events:none;background:linear-gradient(180deg,rgba(0,0,0,.72) 0%, transparent 22%, transparent 72%, rgba(0,0,0,.88) 100%);transition:opacity .25s ease}
.player.ui-hidden .pcontrols{opacity:0;pointer-events:none}
.player.locked .pcontrols{opacity:0;pointer-events:none}
.player .ptop, .player .pbottom, .player .center-row, .player .floating-btns{pointer-events:auto}

/* Skip Intro floating button */
.player .floating-btns { position:absolute; bottom: 85px; right: 24px; display:flex; flex-direction:column; gap:10px; z-index:15; }
.player .btn-skip-intro { background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-weight: 600; font-size: 13px; padding: 10px 18px; border-radius: 4px; cursor: pointer; transition: all 0.2s; display:none; }
.player .btn-skip-intro:hover { background: #fff; color: #000; }
.player.ui-hidden .floating-btns{opacity:0; pointer-events:none;}

/* Player Settings Sheet (Quality / Speed / Audio / Subtitles) */
.player .settings-sheet{position:absolute;inset:0;z-index:40;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.55)}
.player .settings-sheet.open{display:flex}
.player .settings-panel{width:100%;max-width:480px;background:#15171f;border-radius:18px 18px 0 0;padding:6px 0 max(16px,env(safe-area-inset-bottom));max-height:74vh;overflow-y:auto;animation:slideUp .25s cubic-bezier(.2,.8,.2,1);border:1px solid rgba(255,255,255,.08);border-bottom:0}
.player .ss-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;font-weight:800;font-size:16px;color:#fff;position:sticky;top:0;background:#15171f;z-index:2}
.player .ss-close{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.08);color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center}
.player .ss-body{padding:4px 0 8px}
.player .ss-group-title{padding:14px 20px 6px;font-size:11px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted)}
.player .ss-item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 20px;font-size:15px;color:#f5f6fa;cursor:pointer;transition:background .15s}
.player .ss-item:hover{background:rgba(255,255,255,.06)}
.player .ss-item.active{color:var(--red2);font-weight:800}
.player .ss-item .tick{color:var(--red2);opacity:0;font-weight:900}
.player .ss-item.active .tick{opacity:1}
@media(max-width:680px){ .player .settings-panel{max-width:none} .player .ss-item{padding:15px 18px} }

/* Top section (Close button only) */
.player .ptop{display:flex; justify-content:flex-end; align-items:center; min-height:48px; width:100%;}

/* Center section (Play, 10s back, 10s forward) */
.player .center-row{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:40px;z-index:15}
.player .center-btn.big{width:76px;height:76px;border-radius:50%;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;transition:all .2s ease;border:0;color:#fff;cursor:pointer;touch-action:manipulation; border: 1px solid rgba(255,255,255,0.1);}
.player .center-btn.big:hover{background:rgba(255,255,255,.2);transform:scale(1.05)}
.player .center-btn.big:active{transform:scale(.95);background:var(--red)}
.player .center-btn.big svg{width:36px;height:36px;pointer-events:none}

.player .skip-btn { position:relative; width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.1); cursor:pointer; transition:transform .2s ease; }
.player .skip-btn:hover { background:rgba(255,255,255,.2); transform:scale(1.05); }
.player .skip-btn:active { transform:scale(.95); }
.player .skip-btn span { position:absolute; font-size:13px; font-weight:700; top:50%; left:50%; transform:translate(-50%, -50%); margin-top:1px; pointer-events:none;}
.player .skip-btn svg { width:32px; height:32px; pointer-events:none;}

.player .pbtns{display:flex;gap:12px;align-items:center}
.player .pbtn{width:40px;height:40px;border-radius:50%;background:transparent;display:flex;align-items:center;justify-content:center;transition:transform .15s ease, color .15s ease;border:0;color:#fff;cursor:pointer;touch-action:manipulation}
.player .pbtn:hover{color:var(--red2);transform:scale(1.1)}
.player .pbtn:active{transform:scale(.95)}
.player .pbtn.disabled { opacity:0.4; pointer-events:none; }
.player .pbtn svg{width:22px;height:22px;pointer-events:none}
.player .pbtn.bg-btn { width:44px; height:44px; }

/* Bottom section (Progress bar + Controls) */
.player .pbottom{display:flex;flex-direction:column;gap:12px; width:100%;}
.player .seek{height:20px;width:100%;position:relative;cursor:pointer;touch-action:none;display:flex;align-items:center;z-index:20;}
.player .seek::before{content:"";position:absolute;left:0;right:0;top:50%;height:4px;transform:translateY(-50%);background:rgba(255,255,255,.25);border-radius:999px;transition:height .15s ease}
.player .seek:hover::before,.player .seek.dragging::before{height:6px}
.player .seek .buf{position:absolute;left:0;top:50%;height:4px;transform:translateY(-50%);background:rgba(255,255,255,.4);border-radius:999px;width:0;pointer-events:none}
.player .seek .fill{position:absolute;left:0;top:50%;height:4px;transform:translateY(-50%);background:var(--red);border-radius:999px;width:0;pointer-events:none}
.player .seek .thumb{position:absolute;top:50%;left:0;transform:translate(-50%,-50%) scale(0);width:16px;height:16px;background:var(--red);border:2px solid #fff;border-radius:50%;box-shadow:0 2px 10px rgba(0,0,0,.65);transition:transform .15s ease;pointer-events:none}
.player .seek:hover .thumb,.player .seek.dragging .thumb{transform:translate(-50%,-50%) scale(1)}

.player .prow{display:flex;align-items:center;justify-content:space-between;width:100%; gap:12px;}
.player .prow-left, .player .prow-right { display:flex; align-items:center; gap:8px; }
.player .time{font-size:13px;color:#fff;min-width:110px;text-align:left;font-variant-numeric:tabular-nums;text-shadow:0 1px 3px rgba(0,0,0,.7); font-weight:600;}
.player .ptitle-bottom { flex:1; text-align:center; color:#fff; font-weight:700; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-shadow:0 1px 4px rgba(0,0,0,0.8); padding:0 12px; }

.player .lock-fab{position:absolute;top:50%;left:24px;transform:translateY(-50%);width:50px;height:50px;border-radius:50%;background:rgba(0,0,0,.6);backdrop-filter:blur(10px);align-items:center;justify-content:center;z-index:25;display:none;border:0;color:#fff;touch-action:manipulation; border: 1px solid rgba(255,255,255,0.1);}
.player.locked .lock-fab{display:flex;opacity:.8}

.player .tap-zones{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr 1fr;z-index:8;touch-action:none}
.player.locked .tap-zones{z-index:22}
.player .tap-zone{-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}
.player .seek-ripple{position:absolute;top:0;bottom:0;width:40%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#fff;font-size:15px;font-weight:800;opacity:0;transform:scale(.95);transition:opacity .2s ease,transform .2s ease;pointer-events:none;background:radial-gradient(ellipse at center,rgba(255,255,255,.15) 0%,transparent 70%);z-index:18;text-shadow:0 2px 6px #000}
.player .seek-ripple.show{opacity:1;transform:scale(1)}
.player .seek-ripple.left{left:0;border-top-right-radius:50% 50%;border-bottom-right-radius:50% 50%}
.player .seek-ripple.right{right:0;border-top-left-radius:50% 50%;border-bottom-left-radius:50% 50%}
.player .seek-ripple svg{width:42px;height:42px}

.player .vol-wrap{display:flex;align-items:center;gap:8px;min-width:40px}
.player .vol-slider{width:0;height:24px;border-radius:999px;cursor:pointer;position:relative;transition:width .2s ease;touch-action:none;overflow:visible; opacity:0;}
.player .vol-slider::before{content:"";position:absolute;left:0;right:0;top:50%;height:4px;transform:translateY(-50%);background:rgba(255,255,255,.3);border-radius:999px}
.player .vol-wrap:hover .vol-slider,.player .vol-wrap.active .vol-slider{width:80px; opacity:1;}
.player .vol-fill{position:absolute;left:0;top:50%;height:4px;transform:translateY(-50%);background:var(--red);border-radius:999px;width:100%;pointer-events:none}

/* Player responsive */
@media(max-width:680px){
  .player .pcontrols{padding:12px 12px calc(12px + env(safe-area-inset-bottom))}
  .player .ptitle-bottom{font-size:13px}
  .player .center-row{gap:24px}
  .player .skip-btn{width:54px; height:54px;}
  .player .center-btn.big{width:64px;height:64px}
  .player .prow{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:center;}
  .player .prow-left{min-width:0;gap:4px;}
  .player .prow-right{min-width:0;justify-content:flex-end;gap:2px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
  .player .prow-right::-webkit-scrollbar{display:none}

  const n = ' '+String(name).toLowerCase()+' ';
  return ADULT_KEYS.some(k => n.includes(k));
}

  {title:'🔪 Thriller', filter: items => items.filter(x=>/thriller|crime/i.test(x.group)).slice(0,20)},

function renderOTTApps() {
  const row = document.getElementById('ottRow');
  const section = document.getElementById('ottSection');
  if(!row) return;
  row.innerHTML = OTT_APPS.map(app => `
    <div class="ott-card ${app.id}" data-ott-id="${app.id}" data-ott-name="${escapeHTML(app.name)}" onclick="openOTT('${app.id}', '${app.name}')" role="button" tabindex="0">
      <span>${app.name}</span>
    </div>
  `).join('');
  section.style.display = 'block';
}

function openOTT(appId, appName) {
  const app = OTT_APPS.find(a=>a.id===appId);
  if(!app){ showToast('Not found'); return; }
  const pool = ALL.filter(it => {
    const g = (it.group||'').toLowerCase();
    return app.keys.some(k => g.includes(k));
  });
  if(!pool.length){ showToast(`No ${appName} titles found on server`); return; }
  const host = document.getElementById('homeRows');
  const hero = document.getElementById('heroMount');
  const ottSec = document.getElementById('ottSection');
  hero.style.display='none'; ottSec.style.display='none';
  host.innerHTML = `<div style="padding:14px 18px 4px;display:flex;align-items:center;gap:12px">
    <button onclick="exitOTT()" style="background:var(--soft);color:#fff;border:0;border-radius:50%;width:38px;height:38px;font-size:20px;cursor:pointer">←</button>
    <h2 style="margin:0;font-size:22px;font-weight:800">${escapeHTML(appName)}</h2>
    <span style="color:var(--muted);font-size:13px">${pool.length} titles</span>
  </div>`;
  OTT_ROW_DEFS.forEach(def=>{
    const items = def.filter(pool);
    if(!items.length) return;
    host.insertAdjacentHTML('beforeend',
      `<div class="section"><h2>${def.title}</h2>
       <div class="row">${items.map(i=>cardHTML(i,i.kind==='live')).join('')}</div></div>`);
  });
  window.scrollTo({top:0,behavior:'smooth'});
}
function exitOTT(){
  document.getElementById('heroMount').style.display='';
  document.getElementById('ottSection').style.display='block';
  buildHome();
}

/* ====================== XTREAM LOADER ====================== */
async function loadAll(){
  const [liveCats, vodCats, serCats] = await Promise.all([
    fetchJSON(`${API_BASE}&action=get_live_categories`),
    fetchJSON(`${API_BASE}&action=get_vod_categories`),
    fetchJSON(`${API_BASE}&action=get_series_categories`),
  ]);
  
  (liveCats||[]).forEach(c=> CAT_MAP.live[c.category_id]=c.category_name);
  (vodCats||[]).forEach(c=> CAT_MAP.vod[c.category_id]=c.category_name);
  (serCats||[]).forEach(c=> CAT_MAP.series[c.category_id]=c.category_name);

  // FIX 4: Sequential Data Loading.
  // We no longer use Promise.all() for stream lists.
  // Firing 3 massive payloads over proxy at exactly the same time throttles Android WebViews and forces network timeouts.
  const liveS = await fetchJSON(`${API_BASE}&action=get_live_streams`).catch(()=>[]);
  const vodS = await fetchJSON(`${API_BASE}&action=get_vod_streams`).catch(()=>[]);
  const serS = await fetchJSON(`${API_BASE}&action=get_series`).catch(()=>[]);

  const items = [];
  let id = 0;
  
  (liveS||[]).forEach(s=>{
    let group = CAT_MAP.live[s.category_id] || 'Live TV';
    items.push({
      id: id++, kind:'live', name: s.name, logo: s.stream_icon||'',
      group: group,
      url: `${STREAM_BASE}/live/${XTREAM.user}/${XTREAM.pass}/${s.stream_id}.m3u8`,
      streamId: s.stream_id,
    });
  });
  
  (vodS||[]).forEach(s=>{
    const ext = s.container_extension || 'mp4';
    items.push({
      id: id++, kind:'movie', name: s.name, logo: s.stream_icon||'',
      group: CAT_MAP.vod[s.category_id] || 'Movies',
      url: `${STREAM_BASE}/movie/${XTREAM.user}/${XTREAM.pass}/${s.stream_id}.${ext}`,
      streamId: s.stream_id, ext,
      rating: s.rating, year: s.year, plot: s.plot,
    });
  });
  
  (serS||[]).forEach(s=>{
    items.push({
      id: id++, kind:'series', name: s.name, logo: s.cover||'',
      group: CAT_MAP.series[s.category_id] || 'Series',
      url: '', 
      seriesId: s.series_id,
      plot: s.plot, rating: s.rating, year: s.releaseDate,
    });
  });
  // Global adult content filter, then re-index IDs so every rendered card opens the exact item it displays.
  return items.filter(it => !isAdult(it.group) && !isAdult(it.name)).map((it, idx)=>({...it, id: idx}));
}

async function resolveSeriesFirstEpisode(item){
  if(item.url) return item.url;
  const info = SERIES_INFO_CACHE[item.seriesId] ||
    (SERIES_INFO_CACHE[item.seriesId] = await fetchJSON(`${API_BASE}&action=get_series_info&series_id=${item.seriesId}`));
  const eps = info && info.episodes;
  if(!eps) return '';
  const firstSeason = Object.keys(eps).sort((a,b)=>+a-+b)[0];
  const ep = eps[firstSeason] && eps[firstSeason][0];
  if(!ep) return '';
  const ext = ep.container_extension || 'mp4';
  return `${STREAM_BASE}/series/${XTREAM.user}/${XTREAM.pass}/${ep.id}.${ext}`;
}

/* ====================== INIT ====================== */
let splashHidden = false;
const SPLASH_MESSAGES = [
  "Loading 1,000,000+ Movies…",
  "Loading Live TV Channels…",
  "Fetching Series…",
  "Preparing Your Entertainment…",
  "Almost Ready…"
];
let splashMsgTimer = null;
function startSplashMessages(){
  const el = document.getElementById('splashMsg');
  if(!el) return;
  let i = 0;
  el.textContent = SPLASH_MESSAGES[0];
  splashMsgTimer = setInterval(()=>{
    i = (i+1) % SPLASH_MESSAGES.length;
    el.style.opacity = 0;
    setTimeout(()=>{ el.textContent = SPLASH_MESSAGES[i]; el.style.opacity = 1; }, 300);
  }, 1800);
}
async function init(){
  // Splash stays until ALL data is fully loaded and the UI is built.
  startSplashMessages();
  try{
    ALL = await loadAll();
    if(!ALL.length) throw new Error('Server returned no items');
    
    MOVIES = ALL.filter(x=>x.kind==='movie');
    SERIES = ALL.filter(x=>x.kind==='series');
    LIVE = ALL.filter(x=>x.kind==='live');

    CATS.movies = ['All', ...uniq(MOVIES.map(x=>x.group)).filter(g=>!isAdult(g)).sort()];
    CATS.series = ['All', ...uniq(SERIES.map(x=>x.group)).filter(g=>!isAdult(g)).sort()];
    CATS.live   = ['All', ...uniq(LIVE.map(x=>x.group)).filter(g=>!isAdult(g)).sort()];

    buildHome();
    renderOTTApps();
    
    buildChips('movieChips', CATS.movies, 'movies');
    buildChips('seriesChips', CATS.series, 'series');
    buildChips('liveChips', CATS.live, 'live');
    
    renderGrid('movies'); renderGrid('series'); renderGrid('live');
  }catch(e){
    const el = document.getElementById('homeRows');
    if(el) el.innerHTML = `<div class="empty">⚠️ ${e.message}<br/><br/><button onclick="location.reload()" style="margin-top:12px;padding:10px 20px;background:#e50914;color:#fff;border:0;border-radius:8px;cursor:pointer">Retry</button></div>`;
  }
  hideSplash();
}
const uniq = a => [...new Set(a.filter(Boolean))];

function hideSplash(){
  if(splashHidden) return; splashHidden = true;
  if(splashMsgTimer){ clearInterval(splashMsgTimer); splashMsgTimer = null; }
  const s = document.getElementById('splash');
  if(!s) return;
  s.classList.add('hide');
  setTimeout(()=>s.remove(), 600);
}

/* ====================== RENDER ====================== */
function imgFor(item){ return item.logo || ''; }

function cardHTML(item, live=false){
  const bg = imgFor(item);
  const initial = (item.name||'?').trim().charAt(0).toUpperCase();
  return `<div class="card ${live?'live':''}" data-open-id="${item.id}" onclick="openDetails(${item.id})" role="button" tabindex="0" aria-label="Open ${escapeHTML(item.name)}">
    ${live?'<div class="badge">LIVE</div>':''}
    <div class="poster" style="${bg?`background-image:url('${escapeAttr(bg)}')`:''}">${bg?'':initial}</div>
    <div class="meta"><div class="t">${escapeHTML(item.name)}</div></div>
  </div>`;
}

function escapeHTML(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function escapeAttr(s){return (s||'').replace(/'/g,"\\'")}

function buildHome(){
  const hostEl = document.getElementById('homeRows');
  hostEl.innerHTML = '';
  const heroPool = MOVIES.filter(m=>m.logo).slice(0,30);
  const hero = heroPool[Math.floor(Math.random()*heroPool.length)] || MOVIES[0] || ALL[0];
  if(hero){
    document.getElementById('heroMount').innerHTML = `
      <div class="hero">
        <div class="bg" style="background-image:url('${escapeAttr(hero.logo||'')}')"></div>
        <div class="grad"></div>
        <div class="inner">
          <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
            <img src="https://www.jeenaflix.com/DOC-20260325-WA0063..png" style="width:20px; border-radius:4px;" onerror="this.style.display='none'">
            <span style="color:#d3d6df; font-weight:700; font-size:12px; letter-spacing:2px; text-transform:uppercase">Series</span>
          </div>
          <h1>${escapeHTML(hero.name)}</h1>
          <p>${escapeHTML(hero.group)} — Top pick for you today.</p>
          <div class="actions">
            <button class="btn play" onclick="playItem(${hero.id})">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="#000"><path d="M8 5v14l11-7z"/></svg> Play
            </button>
            <button class="btn info" onclick="openDetails(${hero.id})">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg> More Info
            </button>
          </div>
        </div>
      </div>`;
  }
  const trending = sample(ALL, 18);
  const popMov = sample(MOVIES, 18);
  const popSer = sample(SERIES, 18);
  const liveSel = sample(LIVE, 18);

  const sections = [
    {title:'🔥 Trending Now', items: trending, live:false},
    {title:'🆕 Latest Movies', items: MOVIES.slice().sort((a,b)=>(+b.year||0)-(+a.year||0)).slice(0,20), live:false},
    {title:'🎬 Popular Movies', items: popMov, live:false},
    {title:'📺 Binge-Worthy Series', items: popSer, live:false},
    {title:'📡 Live TV', items: liveSel, live:true},
  ];
  sections.forEach(s=>{
    if(!s.items.length) return;
    const html = `<div class="section"><h2>${escapeHTML(s.title)}</h2>
      <div class="row">${s.items.map(i=>cardHTML(i,s.live)).join('')}</div></div>`;
    hostEl.insertAdjacentHTML('beforeend', html);
  });

  // Auto-generate a row per top movie category (up to 40 largest, non-adult)
  const catCounts = {};
  MOVIES.forEach(m=>{ if(!isAdult(m.group)) catCounts[m.group]=(catCounts[m.group]||0)+1; });
  const topCats = Object.entries(catCounts)
    .filter(([n,c])=> c>=6 && !isAdult(n))
    .sort((a,b)=>b[1]-a[1]).slice(0,40);
  topCats.forEach(([cat])=>{
    const items = sample(MOVIES.filter(m=>m.group===cat), 20);
    if(!items.length) return;
    hostEl.insertAdjacentHTML('beforeend',
      `<div class="section"><h2>${escapeHTML(cat)}</h2>
       <div class="row">${items.map(i=>cardHTML(i,false)).join('')}</div></div>`);
  });

  // Same for series (top 20)
  const serCounts = {};
  SERIES.forEach(m=>{ if(!isAdult(m.group)) serCounts[m.group]=(serCounts[m.group]||0)+1; });
  const topSer = Object.entries(serCounts)
    .filter(([n,c])=> c>=4 && !isAdult(n))
    .sort((a,b)=>b[1]-a[1]).slice(0,20);
  topSer.forEach(([cat])=>{
    const items = sample(SERIES.filter(m=>m.group===cat), 20);
    if(!items.length) return;
    hostEl.insertAdjacentHTML('beforeend',
      `<div class="section"><h2>📺 ${escapeHTML(cat)}</h2>
       <div class="row">${items.map(i=>cardHTML(i,false)).join('')}</div></div>`);
  });
}

function sample(arr, n){
  const a = arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a.slice(0,n);
}

function buildChips(elId, cats, kind){
  document.getElementById(elId).innerHTML = cats.map(c=>`<div class="chip ${c==='All'?'active':''}" onclick="pickCat('${kind}','${escapeAttr(c)}',this)">${escapeHTML(c)}</div>`).join('');
}

function pickCat(kind, cat, el){
  activeCat[kind]=cat;
  el.parentNode.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  renderGrid(kind);
}

function renderGrid(kind){
  const src = kind==='movies'?MOVIES:kind==='series'?SERIES:LIVE;
  const cat = activeCat[kind];
  const items = cat==='All'?src:src.filter(x=>x.group===cat);
  const gridId = kind==='movies'?'movieGrid':kind==='series'?'seriesGrid':'liveGrid';
  const live = kind==='live';
  if(!items.length){ document.getElementById(gridId).innerHTML = '<div class="empty">No items in this category.</div>'; return; }
  document.getElementById(gridId).innerHTML = items.slice(0,500).map(i=>cardHTML(i,live)).join('');
}

/* ====================== NAV ====================== */
let CURRENT_PAGE = 'home';
function goTo(page){
  CURRENT_PAGE = page;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.page===page));
  if(typeof _closeSearchNow === 'function') _closeSearchNow(); else closeSearch();
  updateSearchPlaceholder();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ====================== SEARCH ====================== */
const sInput = document.getElementById('searchInput');
const sBox   = document.getElementById('searchBox');
const sRes   = document.getElementById('searchResults');

function searchPool(){
  if(CURRENT_PAGE==='movies') return ALL.filter(x=>x.kind==='movie');
  if(CURRENT_PAGE==='series') return ALL.filter(x=>x.kind==='series');
  if(CURRENT_PAGE==='live')   return ALL.filter(x=>x.kind==='live');
  return ALL;
}
function updateSearchPlaceholder(){
  if(!sInput) return;
  const map = {home:'Search everything…', movies:'Search movies…', series:'Search TV series…', live:'Search live channels…'};
  sInput.placeholder = map[CURRENT_PAGE] || 'Search…';
}
const sClear = document.getElementById('searchClear');
const sBackdrop = document.getElementById('searchBackdrop');

// Detect OTT platform from name/group using existing OTT_APPS keys
function detectOTT(item){
  const hay = ((item.group||'') + ' ' + (item.name||'')).toLowerCase();
  const app = OTT_APPS.find(a => a.keys.some(k => hay.includes(k)));
  return app ? app.name : '';
}
function extractYear(item){
  if(item.year){
    const m = String(item.year).match(/(19|20)\d{2}/);
    if(m) return m[0];
  }
  const m = (item.name||'').match(/\((19|20)\d{2}\)/);
  return m ? m[0].replace(/[()]/g,'') : '';
}
function typeLabel(kind){
  return kind==='movie'?'Movie':kind==='series'?'Series':kind==='live'?'Live':kind;
}

let searchDebounce = null;
function openSearch(){
  if(!sBox || !sInput) return;
  sBox.classList.add('open');
  document.body.classList.add('search-active');
  if(typeof viewStack !== 'undefined' && viewStack[viewStack.length-1] !== 'search' && typeof pushView === 'function') pushView('search');
  setTimeout(()=>sInput.focus({preventScroll:true}), 40);
  if(sInput.value.trim()) runSearch();
}
function renderSearchSkeleton(){
  sRes.innerHTML = '<div class="searching">' + Array.from({length:6},()=>'<div class="search-skeleton"></div>').join('') + '</div>';
  sRes.classList.add('open');
  document.body.classList.add('search-active');
}
function runSearch(){
  const q = sInput.value.trim().toLowerCase();
  sBox.classList.toggle('has-value', q.length>0);
  if(q.length<1){ _closeSearchNow(); return; }
  sBox.classList.add('open');
  document.body.classList.add('search-active');
  if(q.length<2){
    sRes.innerHTML = '<div class="empty">Keep typing…</div>';
    sRes.classList.add('open');
    return;
  }
  const pool = searchPool();
  const starts = [], contains = [];
  for(const x of pool){
    const n = (x.name||'').toLowerCase();
    if(!n) continue;
    if(n.startsWith(q)) starts.push(x);
    else if(n.includes(q)) contains.push(x);
    if(starts.length + contains.length > 500) break;
  }
  const matches = starts.concat(contains).slice(0,48);
  if(!matches.length){
    sRes.innerHTML = '<div class="empty">No results for "'+escapeHTML(sInput.value.trim())+'"</div>';
    sRes.classList.add('open');
    return;
  }
  sRes.innerHTML = '<div class="search-grid">' + matches.map((i,idx)=>{
    const isLive = i.kind==='live';
    const initial = (i.name||'?').trim().charAt(0).toUpperCase();
    const bg = i.logo ? `background-image:url('${escapeAttr(i.logo)}')` : '';
    const year = extractYear(i) || '—';
    const ott = detectOTT(i) || i.group || 'JeenaFlix';
    const type = typeLabel(i.kind);
    const tags = [
      `<span class="tag type-${i.kind}">${type}</span>`,
      `<span class="tag year">${escapeHTML(year)}</span>`,
      `<span class="tag ott">${escapeHTML(ott)}</span>`
    ].join('');
    return `<div class="search-item ${isLive?'live':''}" data-open-id="${i.id}" style="animation-delay:${Math.min(idx*16,280)}ms" onclick="openDetails(${i.id});closeSearch()" role="button" tabindex="0" aria-label="Open ${escapeHTML(i.name)}">
      <div class="pp" style="${bg}">${bg?'':initial}</div>
      <div class="si-meta">
        <div class="si-t">${escapeHTML(i.name)}</div>
        <div class="si-tags">${tags}</div>
      </div>
      <div class="si-go"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></div>
    </div>`;
  }).join('') + '</div>';
  sRes.classList.add('open');
  sRes.scrollTop = 0;
}
sInput.addEventListener('input', ()=>{
  clearTimeout(searchDebounce);
  const q = sInput.value.trim();
  sBox.classList.toggle('has-value', q.length>0);
  if(!q){ closeSearch(); return; }
  if(!document.body.classList.contains('search-active')) openSearch();
  if(q.length >= 2) renderSearchSkeleton();
  searchDebounce = setTimeout(runSearch, 0);
});
sInput.addEventListener('focus', ()=>{
  if(sInput.value.trim()) runSearch();
});
sInput.addEventListener('keydown', e=>{
  if(e.key==='Escape'){ closeSearch(); }
  else if(e.key==='Enter'){
    const first = sRes.querySelector('.search-item');
    if(first) first.click();
  }
});
function hideSearchResults(){
  sRes.classList.remove('open');
  sRes.innerHTML = '';
  document.body.classList.remove('search-active');
}
function clearSearch(){ closeSearch(); }
function _closeSearchNow(){
  clearTimeout(searchDebounce);
  hideSearchResults();
  sInput.value='';
  sBox.classList.remove('has-value','open');
  if(document.activeElement===sInput) sInput.blur();
}
function closeSearch(){
  if(typeof viewStack !== 'undefined' && viewStack[viewStack.length-1]==='search') history.back();
  else _closeSearchNow();
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.search')&&!e.target.closest('.search-results')&&!e.target.closest('.search-toggle')) closeSearch();
}, true);
document.addEventListener('keydown', e=>{
  if(e.key==='Escape' && (sRes.classList.contains('open') || sBox.classList.contains('open'))) closeSearch();
});
if(sBackdrop) sBackdrop.addEventListener('click', closeSearch);
sRes.addEventListener('keydown', e=>{
  if((e.key==='Enter' || e.key===' ') && e.target.closest('.search-item')){
    e.preventDefault(); e.target.closest('.search-item').click();
  }
});
updateSearchPlaceholder();

  detailsEl.innerHTML = `

    <div class="body">
      <h1>${escapeHTML(item.name)}</h1>
      <div class="info">
        <span class="match">98% Match</span>
        <span>${escapeHTML(item.year || '2024')}</span>
        <span>${item.kind.toUpperCase()}</span>
        <span>4K HD</span>
      </div>
      <p class="desc">${escapeHTML(item.plot || `Enjoy ${item.name} in ultra-premium quality. Available now on JeenaFlix.`)}</p>

async function playItem(id){
  const item = ALL[id]; if(!item) return;
  currentItemId = id;
  video.playbackRate = 1;
  document.getElementById('ptitle').textContent = item.name || '';
  closeDetails();
  
  if(item.kind === 'series') {
    btnSkipIntro.style.display = 'block';
  } else {
    btnSkipIntro.style.display = 'none';
  }

  if (item.kind === 'live') {
    document.getElementById('pseek').style.visibility = 'hidden';
    document.getElementById('ptime').style.visibility = 'hidden';
    document.querySelector('.center-row').style.display = 'none';
  } else {
    document.getElementById('pseek').style.visibility = 'visible';
    document.getElementById('ptime').style.visibility = 'visible';
    document.querySelector('.center-row').style.display = 'flex';
  }

  playerEl.classList.add('open','loading');
  playerEl.classList.remove('locked','ui-hidden');
  showControls(true);
  resetPlayerUi();

  destroyHls();
  video.pause();
  video.removeAttribute('src');
  video.load();

  let url = item.url;
  if(item.kind==='series' && !url){
    try{ url = await resolveSeriesFirstEpisode(item); item.url = url; }
    catch(e){ showToast('Could not load episode'); playerEl.classList.remove('loading'); return; }
  }
  if(!url){ showToast('No stream URL'); playerEl.classList.remove('loading'); return; }

  currentResumeKey = 'jf_resume_' + (item.kind==='series' ? ('series_'+(item.seriesId||id)+'_'+simpleHash(url)) : id);
  const saved = parseFloat(localStorage.getItem(currentResumeKey)||'0');

  const startWhenReady = ()=>{
    if(item.kind !== 'live' && saved>5 && isFinite(video.duration) && saved < video.duration-8) video.currentTime = saved;
    video.play().then(()=>showControls(false)).catch(()=>showControls(true));
  };

  if(url.endsWith('.m3u8') || url.includes('.m3u8?')){
    if(window.Hls && Hls.isSupported()){
      hls = new Hls({
        autoStartLoad: true,
        lowLatencyMode: true,
        backBufferLength: 30,
        maxBufferLength: 20,
        startLevel: -1,
        subtitleDisplay: true,
        renderTextTracksNatively: true,
        enableWebVTT: true,
      });
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
        availableQualities = hls.levels || [];
        document.getElementById('qualityBtn').style.display = 'flex';
        startWhenReady();
      });
      hls.on(Hls.Events.ERROR, (_,d)=>{
        if(!d || !d.fatal) return;
        if(d.type === Hls.ErrorTypes.NETWORK_ERROR){ try{ hls.startLoad(); }catch(e){} }
        else if(d.type === Hls.ErrorTypes.MEDIA_ERROR){ try{ hls.recoverMediaError(); }catch(e){} }
        else { showToast('Stream error'); playerEl.classList.remove('loading'); }
      });
    } else if(video.canPlayType('application/vnd.apple.mpegurl')){
      video.src = url;
      video.addEventListener('loadedmetadata', startWhenReady, {once:true});
    }
  } else {
    video.src = url;
    video.addEventListener('loadedmetadata', startWhenReady, {once:true});
    document.getElementById('qualityBtn').style.display='flex';
  }
}
function destroyHls(){ if(hls){try{hls.destroy()}catch(e){} hls=null;} }
function saveResume(){
  const item = ALL[currentItemId];
  if(item && item.kind!=='live' && currentItemId!==null && currentResumeKey && isFinite(video.duration) && video.duration>0 && video.currentTime>5 && video.currentTime < video.duration-10){
    localStorage.setItem(currentResumeKey, String(video.currentTime));
  }
}
function simpleHash(str){
  let h=0; for(let i=0;i<String(str).length;i++){ h=((h<<5)-h)+String(str).charCodeAt(i); h|=0; }
  return Math.abs(h).toString(36);
}

function skip(sec){
  if(!playerEl.classList.contains('open') || ALL[currentItemId]?.kind === 'live') return;
  const dur = isFinite(video.duration) ? video.duration : 0;

function buildSettings(){
  const body = document.getElementById('ssBody');
  if(!body) return;
  let h = '';
  // Playback speed (always available)
  const speeds = [0.5, 0.75, 1, 1.25, 1.5, 2];
  h += '<div class="ss-group-title">Playback Speed</div>';
  speeds.forEach(sp=>{
    const on = Math.abs(video.playbackRate - sp) < 0.01;
    h += `<div class="ss-item ${on?'active':''}" onclick="setSpeed(${sp})"><span>${sp===1?'Normal (1x)':sp+'x'}</span><span class="tick">✓</span></div>`;
  });
  // Quality
  if(hls && availableQualities.length > 1){
    h += '<div class="ss-group-title">Quality</div>';
    h += `<div class="ss-item ${hls.currentLevel===-1?'active':''}" onclick="setQualityLevel(-1)"><span>Auto</span><span class="tick">✓</span></div>`;
    availableQualities.forEach((lv,i)=>{
      const lbl = lv.height ? lv.height+'p' : (lv.bitrate?Math.round(lv.bitrate/1000)+'k':'Level '+(i+1));
      h += `<div class="ss-item ${hls.currentLevel===i?'active':''}" onclick="setQualityLevel(${i})"><span>${lbl}</span><span class="tick">✓</span></div>`;
    });
  }
  // Audio tracks
  if(hls && hls.audioTracks && hls.audioTracks.length > 1){
    h += '<div class="ss-group-title">Audio</div>';
    hls.audioTracks.forEach((t,i)=>{
      const nm = t.name || t.lang || ('Track '+(i+1));
      h += `<div class="ss-item ${hls.audioTrack===i?'active':''}" onclick="setAudioTrack(${i})"><span>${escapeHTML(nm)}</span><span class="tick">✓</span></div>`;
    });
  }
  // Subtitles (HLS)
  if(hls && hls.subtitleTracks && hls.subtitleTracks.length){
    h += '<div class="ss-group-title">Subtitles</div>';
    h += `<div class="ss-item ${hls.subtitleTrack===-1?'active':''}" onclick="setSubtitleTrack(-1)"><span>Off</span><span class="tick">✓</span></div>`;
    hls.subtitleTracks.forEach((t,i)=>{
      const nm = t.name || t.lang || ('Subtitle '+(i+1));
      h += `<div class="ss-item ${hls.subtitleTrack===i?'active':''}" onclick="setSubtitleTrack(${i})"><span>${escapeHTML(nm)}</span><span class="tick">✓</span></div>`;
    });
  } else if(video.textTracks && video.textTracks.length){
    h += '<div class="ss-group-title">Subtitles</div>';
    let anyOn = false;
    for(let i=0;i<video.textTracks.length;i++){ if(video.textTracks[i].mode==='showing') anyOn = true; }
    h += `<div class="ss-item ${!anyOn?'active':''}" onclick="setNativeSub(-1)"><span>Off</span><span class="tick">✓</span></div>`;
    for(let i=0;i<video.textTracks.length;i++){
      const tt = video.textTracks[i];
      const nm = tt.label || tt.language || ('Subtitle '+(i+1));
      h += `<div class="ss-item ${tt.mode==='showing'?'active':''}" onclick="setNativeSub(${i})"><span>${escapeHTML(nm)}</span><span class="tick">✓</span></div>`;
    }
  }
  body.innerHTML = h;
}
function setSpeed(sp){ video.playbackRate = sp; showToast('Speed: '+(sp===1?'Normal':sp+'x')); buildSettings(); }
function setQualityLevel(i){ if(!hls) return; hls.currentLevel = i; currentLevel = i; showToast('Quality: '+(i===-1?'Auto':(availableQualities[i].height?availableQualities[i].height+'p':'Level '+(i+1)))); buildSettings(); }
function setAudioTrack(i){ if(!hls) return; hls.audioTrack = i; showToast('Audio changed'); buildSettings(); }
function setSubtitleTrack(i){ if(!hls) return; hls.subtitleTrack = i; showToast(i===-1?'Subtitles Off':'Subtitles On'); buildSettings(); }
function setNativeSub(i){ for(let j=0;j<video.textTracks.length;j++){ video.textTracks[j].mode = (j===i)?'showing':'disabled'; } showToast(i===-1?'Subtitles Off':'Subtitles On'); buildSettings(); }
function cycleQuality(){
  if(!hls||!availableQualities.length) return;
  currentLevel = currentLevel+1; if(currentLevel>=availableQualities.length) currentLevel=-1;
  hls.currentLevel = currentLevel;
  const txt = currentLevel===-1?'Auto':availableQualities[currentLevel].height+'p';
  showToast('Quality: '+txt);

}
let toastTimer;
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:24%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.86);color:#fff;padding:12px 24px;border-radius:30px;z-index:220;font-size:14px; font-weight:600; transition:opacity .3s;pointer-events:none; border: 1px solid rgba(255,255,255,0.1);';document.body.appendChild(t);}
  t.textContent=msg; t.style.opacity=1; clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.style.opacity=0,2000);

function fmt(s){ if(!isFinite(s)) return '00:00'; s=Math.max(0,s); const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=Math.floor(s%60); const mm=(m<10&&h?'0':'')+m, ss=(sec<10?'0':'')+sec; return h?h+':'+mm+':'+ss:m+':'+ss; }
function updateProgress(forcePct){
  if (ALL[currentItemId]?.kind === 'live') return;
  const dur = isFinite(video.duration) ? video.duration : 0;
  const pct = typeof forcePct==='number' ? forcePct : (dur ? video.currentTime/dur*100 : 0);
  fillEl.style.width = Math.max(0, Math.min(100, pct))+'%';
  thumbEl.style.left = Math.max(0, Math.min(100, pct))+'%';
  timeEl.textContent = fmt(video.currentTime)+' / '+fmt(dur);
  
  if(video.currentTime > 120 && btnSkipIntro.style.display === 'block') {
      btnSkipIntro.style.display = 'none';
  }
}
video.addEventListener('play', ()=>{updatePP(true);showControls(false);});
video.addEventListener('pause', ()=>{updatePP(false);showControls(true);});

/* Wait/Loading Events */
video.addEventListener('waiting', ()=>playerEl.classList.add('loading'));

video.addEventListener('canplay', ()=>playerEl.classList.remove('loading'));

  const dur = isFinite(video.duration) ? video.duration : 0;
  if(!dur || !video.buffered.length || ALL[currentItemId]?.kind === 'live') return;
  try{ const end = video.buffered.end(video.buffered.length-1); bufEl.style.width = Math.max(0, Math.min(100, end/dur*100))+'%'; }catch(e){}
});
video.addEventListener('click', e=>e.preventDefault());

function seekToClientX(clientX, commit=true){
  if (ALL[currentItemId]?.kind === 'live') return;
  const r = seekEl.getBoundingClientRect();
  const p = Math.max(0, Math.min(1, (clientX-r.left)/Math.max(1,r.width)));
  updateProgress(p*100);
  if(commit && isFinite(video.duration) && video.duration>0){ video.currentTime = p*video.duration; }
  return p;
}
seekEl.addEventListener('pointerdown', e=>{
  if (ALL[currentItemId]?.kind === 'live') return;

  seekEl.setPointerCapture?.(e.pointerId);
  seekToClientX(e.clientX, true);
  showControls(true);
});
seekEl.addEventListener('pointermove', e=>{
  if(!isSeeking) return;
  e.preventDefault(); e.stopPropagation();
  seekToClientX(e.clientX, true);
});
function finishSeek(e){
  if(!isSeeking) return;
  if(e){ e.preventDefault(); e.stopPropagation(); seekToClientX(e.clientX, true); }

  seekEl.classList.remove('dragging');
  showControls(false);
}
seekEl.addEventListener('pointerup', finishSeek);

/* Strict Single Tap to Show/Hide Controls & Double tap to skip */
let tapTimer = null;
let tapLastTime = 0;
let tapLastSide = '';
document.querySelectorAll('#tapZones .tap-zone').forEach((zone, index)=>{
  const side = index===0 ? 'left' : index===2 ? 'right' : 'middle';
  zone.addEventListener('pointerdown', e=>{
    if(!playerEl.classList.contains('open')) return;
    if(playerEl.classList.contains('locked')){
      e.preventDefault(); e.stopPropagation();
      playerEl.classList.remove('locked');
      showControls(false); // start 2.5s timer
      return;
    }
    e.preventDefault(); e.stopPropagation();
    const now = Date.now();
    const isDouble = now - tapLastTime < 330 && tapLastSide === side;
    clearTimeout(tapTimer);
    if(isDouble){
      if(side==='left') skip(-10);
      else if(side==='right') skip(10);
      else togglePlay();
      tapLastTime = 0; tapLastSide = '';
    } else {
      tapLastTime = now; tapLastSide = side;
      tapTimer = setTimeout(()=>{
        // Toggle Logic
        if(playerEl.classList.contains('ui-hidden')){
            showControls(false); // Will show and hide after 2.5s
        } else {
            hideControlsNow(); // Instantly hide if already showing
        }
        tapTimer = null;
      }, 230);
    }
  });
});

/* Controls Timer Logic (2.5 seconds hide) */
function showControls(keepVisible=false){
  if(!playerEl.classList.contains('open') || playerEl.classList.contains('locked')) return;
  playerEl.classList.remove('ui-hidden');
  clearTimeout(controlsTimer);
  if(keepVisible || video.paused || hideControlsLocked) return;
  // 2.5 seconds auto-hide timer
  controlsTimer = setTimeout(()=>hideControlsNow(), 2500);
}
function hideControlsNow(){

  playerEl.classList.add('ui-hidden');
}

let volumeDragging = false;
function volumeFromClientX(clientX){
  const r = volSlider.getBoundingClientRect();
  setVolume((clientX-r.left)/Math.max(1,r.width));
}
volSlider.addEventListener('pointerdown', e=>{
  e.preventDefault(); e.stopPropagation();
  volumeDragging = true; volWrap.classList.add('active'); volSlider.setPointerCapture?.(e.pointerId); volumeFromClientX(e.clientX);
});
volSlider.addEventListener('pointermove', e=>{ if(volumeDragging){ e.preventDefault(); e.stopPropagation(); volumeFromClientX(e.clientX); } });
function endVolume(e){ if(!volumeDragging) return; volumeDragging=false; volWrap.classList.remove('active'); if(e){e.preventDefault();e.stopPropagation();} }
volSlider.addEventListener('pointerup', endVolume);
volSlider.addEventListener('pointercancel', endVolume);
volFill.style.width='100%';
updateMuteIcon();

const viewStack = [];
function pushView(name){
  viewStack.push(name);
  history.pushState({jf:name, depth:viewStack.length}, '');
}
function historyBack(){
  if(viewStack.length) history.back();
  else closeAllOverlays();
}
function closeTopView(){
  const name = viewStack.pop();
  if(name==='search') _closeSearchNow();
  if(name==='player') _closePlayerNow();
  else if(name==='details') _closeDetailsNow();
}
function closeAllOverlays(){
  while(viewStack.length) closeTopView();
}
window.addEventListener('popstate', ()=>{
  if(viewStack.length) closeTopView();
});
if(!history.state || !history.state.jfAnchor){
  history.replaceState({jfAnchor:true}, '');
}

const _openDetails = openDetails;
window.openDetails = async function(id){
  await _openDetails(id);
  if(viewStack[viewStack.length-1] !== 'details') pushView('details');
};
const _closeDetailsOrig = closeDetails;
function _closeDetailsNow(){ _closeDetailsOrig(); }
window.closeDetails = function(){
  if(viewStack[viewStack.length-1]==='details'){ history.back(); }
  else { _closeDetailsNow(); }
};

const _playItem = playItem;
window.playItem = async function(id){
  const hadDetails = viewStack[viewStack.length-1] === 'details';
  await _playItem(id);
  if(hadDetails) viewStack.pop();
  if(viewStack[viewStack.length-1] !== 'player') pushView('player');
};
function _closePlayerNow(){
  document.getElementById('settingsSheet')?.classList.remove('open');
  saveResume();
  video.pause(); destroyHls(); video.removeAttribute('src'); video.load();
  playerEl.classList.remove('open','loading','locked','ui-hidden');
  if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
}
window.closePlayer = function(){
  if(viewStack[viewStack.length-1]==='player'){ history.back(); }
  else { _closePlayerNow(); }
};

video.addEventListener('ended', ()=>{
  if(currentItemId===null) return;
  const cur = ALL[currentItemId];
  if(cur.kind!=='series') return;
  if(currentEpisodeIndex >= 0 && currentEpisodeIndex < currentSeriesEpisodes.length - 1) {
      showToast('Playing next episode...');
      setTimeout(()=>{ /* logic to play next */ }, 800);
  }
});

init();
</script>
